  <style>
    /* ==============================
       المتغيرات الأساسية للتصميم
       ============================== */
    :root {
      --bg:        #0f1b2d;
      --surface:   #162236;
      --card:      #1e3050;
      --accent:    #c8922a;
      --accent2:   #e8b84b;
      --text:      #e8dcc8;
      --text-muted:#8a9bb8;
      --success:   #3ddc97;
      --danger:    #e05c5c;
      --border:    rgba(200,146,42,0.25);
    }

    /* ==============================
       القواعد الأساسية للصفحة
       ============================== */
    html, body, #app-root {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Kufi Arabic', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    #app-root {
      overflow-y: auto;
    }

    /* ==============================
       خلفية الصفحة - طبقات متعددة
       ============================== */
    .page-bg {
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,146,42,0.12), transparent),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(61,220,151,0.05), transparent),
        var(--bg);
      min-height: 100%;
    }

    /* ==============================
       نمط الشبكة الخلفية الزخرفية
       ============================== */
    .page-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,146,42,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,146,42,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    /* ==============================
       بطاقة الحاوية الرئيسية
       ============================== */
    .main-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,146,42,0.1);
    }

    /* ==============================
       شريط الرأس الذهبي
       ============================== */
    .header-bar {
      background: linear-gradient(135deg, #1a2d4a 0%, #1e3050 50%, #162236 100%);
      border-bottom: 2px solid var(--accent);
      border-radius: 20px 20px 0 0;
      position: relative;
      overflow: hidden;
    }

    .header-bar::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), var(--accent2), transparent);
    }

    /* ==============================
       الحقول والـ Dropdown
       ============================== */
    .form-input {
      background: rgba(15,27,45,0.8);
      border: 1.5px solid rgba(200,146,42,0.3);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Noto Kufi Arabic', sans-serif;
      font-size: 15px;
      padding: 12px 16px;
      width: 100%;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,146,42,0.15);
      background: rgba(15,27,45,0.95);
    }

    .form-input option {
      background: #1e3050;
      color: var(--text);
    }

    /* ==============================
       زر البحث
       ============================== */
    .search-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0f1b2d;
      font-family: 'Noto Kufi Arabic', sans-serif;
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      padding: 13px 32px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(200,146,42,0.35);
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .search-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(200,146,42,0.5);
      filter: brightness(1.08);
    }

    .search-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .search-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ==============================
       شاشة التحميل
       ============================== */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    .loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* حلقة التحميل الدوارة */
    .spinner-ring {
      width: 70px;
      height: 70px;
      border: 4px solid rgba(200,146,42,0.15);
      border-top: 4px solid var(--accent);
      border-right: 4px solid var(--accent2);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ==============================
       بطاقات النتيجة
       ============================== */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .result-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    /* ==============================
       شارات التقدير
       ============================== */
    .grade-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 18px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .grade-excellent  { background: rgba(61,220,151,0.15); color: #3ddc97; border: 1px solid rgba(61,220,151,0.4); }
    .grade-very-good  { background: rgba(100,180,255,0.15); color: #64b4ff; border: 1px solid rgba(100,180,255,0.4); }
    .grade-good       { background: rgba(200,146,42,0.2);  color: var(--accent2); border: 1px solid rgba(200,146,42,0.5); }
    .grade-pass       { background: rgba(255,180,80,0.15); color: #ffb450; border: 1px solid rgba(255,180,80,0.4); }
    .grade-fail       { background: rgba(224,92,92,0.15);  color: var(--danger);  border: 1px solid rgba(224,92,92,0.4); }
    .grade-na         { background: rgba(138,155,184,0.1); color: var(--text-muted); border: 1px solid rgba(138,155,184,0.3); }

    /* ==============================
       رسالة الخطأ / النجاح
       ============================== */
    .alert-box {
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 15px;
    }

    .alert-error   { background: rgba(224,92,92,0.12); border: 1px solid rgba(224,92,92,0.4); color: #f08080; }
    .alert-warning { background: rgba(255,180,80,0.12); border: 1px solid rgba(255,180,80,0.4); color: #ffb450; }

    /* ==============================
       معلومات الطالب الشخصية
       ============================== */
    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(15,27,45,0.5);
      border-radius: 10px;
      border: 1px solid rgba(200,146,42,0.12);
    }

    .info-label {
      color: var(--text-muted);
      font-size: 13px;
      min-width: 90px;
    }

    .info-value {
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
    }

    /* ==============================
       نتيجة المواد - شبكة
       ============================== */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }

    /* ==============================
       شريط النتيجة النهائية
       ============================== */
    .final-result-bar {
      background: linear-gradient(135deg, rgba(30,48,80,0.8), rgba(22,34,54,0.8));
      border: 1px solid var(--accent);
      border-radius: 16px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .final-result-bar::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--accent2), var(--accent));
    }

    /* ==============================
       انيميشن ظهور النتائج
       ============================== */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate-up {
      animation: slideUp 0.4s ease forwards;
    }

    .animate-up:nth-child(1) { animation-delay: 0.05s; }
    .animate-up:nth-child(2) { animation-delay: 0.1s; }
    .animate-up:nth-child(3) { animation-delay: 0.15s; }
    .animate-up:nth-child(4) { animation-delay: 0.2s; }
    .animate-up:nth-child(5) { animation-delay: 0.25s; }

    /* ==============================
       تحسينات الاستجابة للشاشات الصغيرة
       ============================== */
    @media (max-width: 640px) {
      .main-card { border-radius: 14px; }
      .subjects-grid { grid-template-columns: 1fr 1fr; }
      .final-result-bar { flex-direction: column; align-items: flex-start; }
    }

    @media (max-width: 400px) {
      .subjects-grid { grid-template-columns: 1fr; }
    }

    /* ==============================
       Tooltip للـ مرحلة الطالب
       ============================== */
    .stage-badge {
      background: rgba(200,146,42,0.18);
      color: var(--accent2);
      border: 1px solid rgba(200,146,42,0.4);
      border-radius: 8px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    /* ==============================
       خط فاصل ذهبي
       ============================== */
    .gold-divider {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 20px 0;
    }

    /* ==============================
       مؤشر حالة الاتصال
       ============================== */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-online  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-loading { background: var(--accent);  box-shadow: 0 0 6px var(--accent); animation: pulse 1s infinite; }
    .status-error   { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ==============================
       زخرفة الأيقونات الكنسية
       ============================== */
    .cross-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      line-height: 1;
    }
  </style>

    <p style="font-size:12px; color: var(--text-muted);">جميع البيانات سرية ومحمية • للاستفسار تواصل مع إدارة المركز</p>

  <script>
/* ================================================================
   ██████╗  █████╗ ████████╗ █████╗
   ██╔══██╗██╔══██╗╚══██╔══╝██╔══██╗
   ██║  ██║███████║   ██║   ███████║
   ██║  ██║██╔══██║   ██║   ██╔══██║
   ██████╔╝██║  ██║   ██║   ██║  ██║
   ╚═════╝ ╚═╝  ╚═╝   ╚═╝   ╚═╝  ╚═╝
   نظام نتائج الدارسين - مركز الحبيب للألحان والدراسات القبطية

   ================================================================ */

/* ================================================================
   1. إعداد روابط Google Sheets بصيغة CSV
   - كل رابط يشير إلى شيت مختلف (midterm1, term1, midterm2, term2)
   - gid= رقم معرّف الشيت داخل ملف Google Sheets
   - استبدل SPREADSHEET_ID بمعرف ملفك الفعلي
   ================================================================ */
const SHEET_URLS = {
  midterm1: 'https://docs.google.com/spreadsheets/d/SPREADSHEET_ID/export?format=csv&gid=0',
  term1:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vRb7PP0zGljjefa771H0xVC4N_NGhas0IcWMcIOyNkFZgqR04ueeJVykUS-HQyT-y0azdCZI6AiQPro/pub?gid=1837227441&single=true&output=csv',
  midterm2: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO_7x8ri8gn0SpiGZCnL8O-LP0IbF_E-uy22BXjTUm2qI4JhaBrYQXDRwV_tjUGfxIiFQ3iP9-auHZ/pub?gid=763792200&single=true&output=csv',
  term2:    'https://docs.google.com/spreadsheets/d/SPREADSHEET_ID/export?format=csv&gid=3',
};

/* ================================================================
   2. أسماء الأعمدة المتوقعة في كل شيت (بنفس الترتيب)
   - الترتيب: كود الدارس، الاسم، المرحلة، الهاتف، الفصل،
               الطقوس، المحفوظات، القبطي، الألحان، المجموع،
               النسبة، النتيجة النهائية
   ================================================================ */
const COLUMNS = {
  CODE:     0,   // كود الدارس
  NAME:     1,   // اسم الدارس
  STAGE:    2,   // المرحلة الدراسية
  PHONE:    3,   // رقم الهاتف
  CLASS:    4,   // الفصل
  LITURGY:  5,   // الطقوس الكنسية
  MEMORY:   6,   // المحفوظات والأجبية
  COPTIC:   7,   // اللغة القبطية
  HYMNS:    8,   // الألحان والتسبيحة
  TOTAL:    9,   // المجموع
  PERCENT:  10,  // النسبة المئوية
  FINAL:    11,  // النتيجة النهائية
};

/* ================================================================
   3. كائن التخزين المؤقت للبيانات (Caching)
   - يُخزَّن هنا جميع البيانات بعد التحميل الأولي
   - لا يُعاد تحميل البيانات عند كل بحث
   ================================================================ */
const allResults = {
  midterm1: [],
  term1:    [],
  midterm2: [],
  term2:    [],
};

/* ================================================================
   4. متغير لتتبع حالة تحميل البيانات
   ================================================================ */
let dataLoaded  = false;
let loadingError = false;

/* ================================================================
   5. أسماء الامتحانات بالعربية (للعرض)
   ================================================================ */
const EXAM_NAMES = {
  midterm1: 'نتيجة الميد ترم – الترم الأول – أكتوبر 2025',
  term1:    'نتيجة الترم الأول – ديسمبر 2025',
  midterm2: 'نتيجة الميد ترم – الترم الثاني – مارس 2026',
  term2:    'نتيجة الترم الثاني – مايو 2026',
};

/* ================================================================
   6. أسماء المواد الدراسية
   ================================================================ */
const SUBJECT_NAMES = {
  LITURGY: 'الطقوس الكنسية',
  MEMORY:  'المحفوظات والأجبية',
  COPTIC:  'اللغة القبطية',
  HYMNS:   'الألحان والتسبيحة',
};

/* ================================================================
   7. أيقونات المواد الدراسية (Unicode Emoji)
   ================================================================ */
const SUBJECT_ICONS = {
  LITURGY: '⛪',
  MEMORY:  '📖',
  COPTIC:  '𓂀',
  HYMNS:   '🎵',
};

/* ================================================================
   8. دالة تحليل CSV إلى مصفوفة من الصفوف
   - تتعامل مع الحقول المحاطة بعلامات اقتباس
   - تتجاهل السطر الأول (العناوين)
   ================================================================ */
function parseCSV(csvText) {
  // تقسيم النص إلى أسطر مع معالجة الأسطر الجديدة المختلفة
  const lines = csvText.split(/\r?\n/);
  const rows  = [];

  // بدء من السطر الثاني (تجاهل عناوين الأعمدة)
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue; // تخطي الأسطر الفارغة

    // تحليل الحقول المعقدة المحاطة بعلامات اقتباس
    const fields = [];
    let inQuote  = false;
    let current  = '';

    for (let j = 0; j < line.length; j++) {
      const ch = line[j];
      if (ch === '"') {
        inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        fields.push(current.trim());
        current = '';
      } else {
        current += ch;
      }
    }
    fields.push(current.trim()); // إضافة الحقل الأخير

    // إضافة الصف فقط إذا احتوى على بيانات
    if (fields[COLUMNS.CODE] && fields[COLUMNS.CODE].length > 0) {
      rows.push(fields);
    }
  }
  return rows;
}

/* ================================================================
   9. دالة جلب وتحليل شيت واحد
   - تُرجع مصفوفة من الصفوف أو مصفوفة فارغة عند الخطأ
   ================================================================ */
async function fetchSheet(key) {
  const url = SHEET_URLS[key];

  // التحقق من وجود رابط حقيقي (مطلوب للإنتاج)
  if (!url || url.includes('SPREADSHEET_ID')) {
    console.warn(`[نظام النتائج] تحذير: رابط ${key} يحتاج إلى ضبط`);
    return []; // إرجاع مصفوفة فارغة في وضع التطوير
  }

  try {
    const response = await fetch(url, {
      cache: 'no-cache', // تجنب التخزين المؤقت للمتصفح للبيانات الحساسة
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: فشل جلب شيت ${key}`);
    }

    const text = await response.text();
    return parseCSV(text);
  } catch (err) {
    console.error(`[نظام النتائج] خطأ في جلب ${key}:`, err.message);
    return []; // لا نوقف التطبيق بسبب شيت واحد فاشل
  }
}

/* ================================================================
   10. دالة التحميل الرئيسية - تحمّل جميع الشيتات مرة واحدة
   - تستخدم Promise.all لتحميل الكل بالتوازي
   - تُحدّث مؤشر الحالة
   ================================================================ */
async function loadAllData() {
  updateStatus('loading', 'جاري تحميل البيانات...');
  document.getElementById('loadingText').textContent    = 'جاري تحميل بيانات النتائج...';
  document.getElementById('loadingSubText').textContent = 'يتم الاتصال بقاعدة البيانات';

  try {
    // تحميل جميع الشيتات بالتوازي لأقصى سرعة
    const [m1, t1, m2, t2] = await Promise.all([
      fetchSheet('midterm1'),
      fetchSheet('term1'),
      fetchSheet('midterm2'),
      fetchSheet('term2'),
    ]);

    // تخزين النتائج في الكائن العام
    allResults.midterm1 = m1;
    allResults.term1    = t1;
    allResults.midterm2 = m2;
    allResults.term2    = t2;

    const total = m1.length + t1.length + m2.length + t2.length;
    dataLoaded  = true;
    loadingError = false;

    // إظهار حالة النجاح
    updateStatus('online', `جاهز • ${total} سجل محمّل`);
    document.getElementById('loadingText').textContent    = 'تم تحميل البيانات بنجاح!';
    document.getElementById('loadingSubText').textContent = `إجمالي ${total} سجل دارس`;

  } catch (err) {
    // معالجة خطأ عام غير متوقع
    loadingError = true;
    updateStatus('error', 'تعذّر تحميل البيانات');
    document.getElementById('loadingText').textContent    = 'حدث خطأ في التحميل';
    document.getElementById('loadingSubText').textContent = err.message;
  } finally {
    // إخفاء شاشة التحميل بعد 800ms بغض النظر عن النتيجة
    await delay(800);
    fadeOutLoader();
  }
}

/* ================================================================
   11. دوال مساعدة
   ================================================================ */

// تأخير زمني (Promise-based)
const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

// إخفاء شاشة التحميل بتأثير تلاشي
function fadeOutLoader() {
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('fade-out');
  setTimeout(() => { overlay.style.display = 'none'; }, 650);
}

// تحديث مؤشر حالة الاتصال
function updateStatus(type, message) {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className  = `status-dot status-${type}`;
  text.textContent = message;
}

/* ================================================================
   12. دالة تحديد CSS class الخاصة بالتقدير
   ================================================================ */
function getGradeClass(grade) {
  if (!grade || grade.trim() === '' || grade === '-') return 'grade-na';

  const g = grade.trim();
  // مطابقة التقديرات العربية والتقديرات الإنجليزية الشائعة
  if (g.includes('ممتاز')       || g.toLowerCase().includes('excellent'))   return 'grade-excellent';
  if (g.includes('جيد جداً')    || g.includes('جيد جدا')   || g.toLowerCase().includes('very good'))  return 'grade-very-good';
  if (g.includes('جيد')         || g.toLowerCase().includes('good'))         return 'grade-good';
  if (g.includes('مقبول')       || g.toLowerCase().includes('pass'))         return 'grade-pass';
  if (g.includes('ضعيف')        || g.toLowerCase().includes('fail'))         return 'grade-fail';
  // أي تقدير آخر
  return 'grade-na';
}

/* ================================================================
   13. دالة البحث الرئيسية
   - تُفعَّل عند ضغط زر "عرض النتيجة"
   ================================================================ */
function handleSearch() {
  const resultArea  = document.getElementById('resultArea');
  const examKey     = document.getElementById('examSelect').value;
  const rawCode     = document.getElementById('studentCode').value;
  const studentCode = rawCode.trim().toUpperCase(); // تنظيف الكود ورفعه لأحرف كبيرة

  // --------- التحقق من صحة المدخلات ---------

  // منع البحث بكود فارغ
  if (!studentCode) {
    showAlert(resultArea, 'error', 'الرجاء إدخال كود الدارس أولاً', 'يوجد عدة أحرف وأرقام في البطاقة الشخصية للدارس.');
    document.getElementById('studentCode').focus();
    return;
  }

  // منع البحث قبل اكتمال تحميل البيانات
  if (!dataLoaded) {
    showAlert(resultArea, 'warning', 'لا تزال البيانات تُحمَّل...', 'يرجى الانتظار حتى يكتمل التحميل ثم المحاولة مرة أخرى.');
    return;
  }

  // التحقق من وجود بيانات للامتحان المختار
  const sheetData = allResults[examKey];
  if (!sheetData || sheetData.length === 0) {
    showAlert(resultArea, 'warning', 'لا تتوفر بيانات لهذا الامتحان حالياً',
      'قد يكون الامتحان لم يُعقد بعد أو لم يُرفع ملف البيانات. تواصل مع إدارة المركز.');
    return;
  }

  // --------- البحث في البيانات ---------
  // البحث بمطابقة تامة للكود (Case-insensitive)
  const studentRow = sheetData.find(
    row => row[COLUMNS.CODE] &&
           row[COLUMNS.CODE].trim().toUpperCase() === studentCode
  );

  if (!studentRow) {
    // لم يُعثر على الطالب
    showAlert(resultArea, 'error',
      `لم يُعثر على دارس بكود: ${studentCode}`,
      `تأكد من صحة الكود المُدخَل أو من اختيار نوع الامتحان الصحيح. إذا استمرت المشكلة، تواصل مع إدارة المركز.`
    );
    return;
  }

  // --------- عرض نتيجة الطالب ---------
  displayResult(resultArea, studentRow, examKey);
}

/* ================================================================
   14. دالة عرض رسائل التنبيه (خطأ / تحذير)
   ================================================================ */
function showAlert(container, type, title, detail) {
  const iconName  = type === 'error' ? 'circle-x' : 'triangle-alert';
  const cssClass  = type === 'error' ? 'alert-error' : 'alert-warning';

  container.innerHTML = `
    <div class="alert-box ${cssClass} animate-up">
      <div style="flex-shrink:0; margin-top:2px;">
        <i data-lucide="${iconName}" style="width:20px; height:20px;"></i>
      </div>
      <div>
        <p style="font-weight:700; font-size:15px; margin-bottom:4px;">${title}</p>
        <p style="font-size:13px; opacity:0.85; line-height:1.7;">${detail}</p>
      </div>
    </div>
  `;
  lucide.createIcons(); // إعادة تهيئة الأيقونات بعد تحديث DOM
}

/* ================================================================

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">

          <i data-lucide="hash" style="width:14px; height:14px; color: var(--accent); flex-shrink:0;"></i>

        </div>
        <div class="info-row">
          <i data-lucide="phone" style="width:14px; height:14px; color: var(--accent); flex-shrink:0;"></i>
          <span class="info-label">الهاتف</span>
          <span class="info-value" style="direction:ltr; text-align:left;">${escapeHtml(phone)}</span>
        </div>
        <div class="info-row" style="grid-column: 1/-1;">
          <i data-lucide="door-open" style="width:14px; height:14px; color: var(--accent); flex-shrink:0;"></i>
          <span class="info-label">الفصل</span>
          <span class="info-value">${escapeHtml(cls)}</span>
        </div>
        <div class="info-row" style="grid-column: 1/-1;">
          <i data-lucide="file-text" style="width:14px; height:14px; color: var(--accent); flex-shrink:0;"></i>
          <span class="info-label">الامتحان</span>
          <span class="info-value" style="font-size:13px;">${EXAM_NAMES[examKey]}</span>
        </div>
      </div>
    </div>

    <!-- قسم نتائج المواد -->
    <div class="result-card animate-up mb-4">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px;">
        <i data-lucide="bar-chart-2" style="width:18px; height:18px; color: var(--accent);"></i>
        <p style="font-size:15px; font-weight:700; color: var(--text);">نتائج المواد الدراسية</p>

      <div class="subjects-grid">
        ${buildSubjectCard('LITURGY', liturgy)}

    ${buildFinalBar(final, finalClass, total, percent)}

  lucide.createIcons();
}

/* ================================================================
   16. دالة بناء بطاقة مادة دراسية واحدة
   ================================================================ */
function buildSubjectCard(subjectKey, grade) {
  const gradeClass   = getGradeClass(grade);
  const displayGrade = (grade && grade !== '—' && grade.trim() !== '') ? grade.trim() : 'لم يُسجَّل';

  return `
    <div style="
      background: rgba(15,27,45,0.6);
      border: 1px solid rgba(200,146,42,0.15);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      transition: all 0.2s;
    ">
      <div style="font-size:22px; margin-bottom:8px;">${SUBJECT_ICONS[subjectKey]}</div>
      <p style="font-size:12px; color: var(--text-muted); margin-bottom:10px; line-height:1.5;">${SUBJECT_NAMES[subjectKey]}</p>
      <span class="grade-badge ${gradeClass}">${escapeHtml(displayGrade)}</span>
    </div>
  `;
}

/* ================================================================
   17. دالة بناء شريط النتيجة النهائية
   ================================================================ */
function buildFinalBar(finalGrade, finalClass, total, percent) {
  const displayFinal = (finalGrade && finalGrade.trim() !== '') ? finalGrade.trim() : 'لم تُحدَّد';
  const hasTotal   = total && total.trim() !== '';
  const hasPercent = percent && percent.trim() !== '';

  return `
    <div class="final-result-bar animate-up">
      <div>
        <p style="font-size:12px; color: var(--text-muted); margin-bottom:6px;">
          <i data-lucide="award" style="width:13px; height:13px; display:inline; vertical-align:middle; margin-left:4px;"></i>
          التقدير العام للدارس
        </p>
        <span class="grade-badge ${finalClass}" style="font-size:16px; padding: 8px 24px;">
          ${escapeHtml(displayFinal)}
        </span>
      </div>
      ${(hasTotal || hasPercent) ? `
      <div style="text-align:left; direction:ltr;">
        ${hasPercent ? `<p style="font-size:24px; font-weight:800; color: var(--accent2);">${escapeHtml(percent)}</p><p style="font-size:11px; color: var(--text-muted);">النسبة المئوية</p>` : ''}
        ${hasTotal   ? `<p style="font-size:14px; color: var(--text-muted); margin-top:4px;">المجموع: <strong style="color: var(--text);">${escapeHtml(total)}</strong></p>` : ''}
      </div>
      ` : ''}
    </div>
  `;
}

/* ================================================================
   18. دالة تنظيف HTML لمنع XSS
   ================================================================ */
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#039;');
}

/* ================================================================
   19. إضافة دعم ضغط Enter على حقل الكود
   ================================================================ */
document.getElementById('studentCode').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    handleSearch();
  }
});

/* ================================================================
   20. تنظيف الكود تلقائياً عند الكتابة (رفع الأحرف)
   ================================================================ */
document.getElementById('studentCode').addEventListener('input', function() {
  const pos = this.selectionStart;
  this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  this.setSelectionRange(pos, pos);
});
