<!doctype html>
<html lang="ar" dir="rtl">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام عرض النتائج - مركز الحبيب للألحان والدراسات القبطية</title>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header Styles */
        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        header h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
        }

        /* Search Card Styles */
        .search-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            animation: slideUp 0.6s ease-out;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 1em;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s ease;
            text-align: right;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Button Styles */
        .btn-search {
            grid-column: 1 / -1;
            padding: 14px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-search:active {
            transform: translateY(0);
        }

        .btn-search:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .loading-screen.hidden {
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            margin-top: 20px;
            font-size: 1.1em;
            text-align: center;
        }

        /* Result Card Styles */
        .result-container {
            display: none;
            animation: fadeIn 0.6s ease-out;
        }

        .result-container.show {
            display: block;
        }

        .student-info {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-right: 5px solid #667eea;
        }

        .info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-label {
            font-weight: 600;
            color: #555;
        }

        .info-value {
            color: #333;
            font-weight: 500;
        }

        /* Grades Table */
        .grades-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .table-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            text-align: center;
            font-weight: 600;
        }

        .table-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            align-items: center;
            text-align: center;
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .table-row:nth-child(even) {
            background: #f9f9f9;
        }

        .grade-badge {
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            color: white;
            display: inline-block;
            min-width: 60px;
        }

        .grade-subject-name {
            text-align: right;
            font-weight: 500;
            color: #333;
        }

        /* Total Section */
        .total-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .total-item h3 {
            font-size: 0.95em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .total-item .value {
            font-size: 2.5em;
            font-weight: bold;
        }

        /* Rating Badge */
        .rating-badge {
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 1.3em;
            font-weight: 600;
            text-align: center;
            margin-top: 20px;
        }

        .rating-excellent {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .rating-very-good {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
        }

        .rating-good {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }

        .rating-acceptable {
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
            color: white;
        }

        .rating-weak {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        /* Error Message */
        .error-message {
            background: #fee;
            border-right: 5px solid #ef4444;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.4s ease-out;
        }

        .error-message.show {
            display: block;
        }

        .error-message h3 {
            margin-bottom: 10px;
        }

        /* Success Message */
        .success-message {
            background: #efe;
            border-right: 5px solid #10b981;
            color: #3c3;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.4s ease-out;
        }

        .success-message.show {
            display: block;
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            header p {
                font-size: 0.95em;
            }

            .search-card {
                padding: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .info-row {
                grid-template-columns: 1fr;
            }

            .table-header,
            .table-row {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                padding: 15px 10px;
            }

            .table-row {
                gap: 10px;
            }

            .total-section {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .total-item .value {
                font-size: 2em;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            header h1 {
                font-size: 1.5em;
            }

            .search-card {
                padding: 15px;
            }

            .form-group select,
            .form-group input {
                padding: 10px 12px;
                font-size: 0.95em;
            }

            .btn-search {
                padding: 12px 20px;
                font-size: 1em;
            }

            .student-info {
                padding: 15px;
            }

            .table-header,
            .table-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .grade-badge,
            .grade-subject-name {
                font-size: 0.9em;
            }

            .total-item .value {
                font-size: 1.8em;
            }

            .rating-badge {
                font-size: 1.1em;
                padding: 12px 15px;
            }
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
            }

            .search-card,
            .btn-search,
            .error-message {
                display: none !important;
            }

            .student-info,
            .grades-table,
            .total-section,
            .rating-badge {
                box-shadow: none;
                border: 1px solid #ddd;
                page-break-inside: avoid;
            }

            header {
                border-bottom: 2px solid #333;
                margin-bottom: 20px;
                padding-bottom: 10px;
            }

            header h1,
            header p {
                color: #000 !important;
            }
        }
    </style>

 <body><!-- Loading Screen -->
  <div id="loadingScreen" class="loading-screen">
   <div>
    <div class="spinner"></div>
    <div class="loading-text">
     جاري تحميل البيانات...
    </div>
   </div>
  </div>
  <div class="container"><!-- Header -->
   <header>
    <h1>🎓 نظام عرض النتائج</h1>
    <p>مركز الحبيب للألحان والدراسات القبطية</p>
   </header><!-- Search Section -->
   <div class="search-card">
    <div class="form-row">
     <div class="form-group"><label for="examType">نوع الامتحان</label> <select id="examType"> <option value="">-- اختر نوع الامتحان --</option> <option value="midterm1">نتيجة الميد ترم - الترم الأول - أكتوبر 2025</option> <option value="term1">نتيجة الترم الأول - ديسمبر 2025</option> <option value="midterm2">نتيجة الميد ترم - الترم الثاني - مارس 2026</option> <option value="term2">نتيجة الترم الثاني - مايو 2026</option> </select>
     </div>
     <div class="form-group"><label for="studentCode">كود الطالب</label> <input type="text" id="studentCode" placeholder="أدخل كود الطالب" autocomplete="off">
     </div>
    </div><button class="btn-search" onclick="searchStudent()">🔍 عرض النتيجة</button>
   </div><!-- Error Message -->
   <div id="errorMessage" class="error-message">
    <h3>⚠️ خطأ</h3>
    <p id="errorText"></p>
   </div><!-- Result Container -->
   <div id="resultContainer" class="result-container"><!-- Student Information -->
    <div class="student-info">
     <div class="info-row">
      <div class="info-item"><span class="info-label">كود الطالب:</span> <span class="info-value" id="resultStudentCode">-</span>
      </div>
      <div class="info-item"><span class="info-label">الاسم:</span> <span class="info-value" id="resultStudentName">-</span>
      </div>
     </div>
     <div class="info-row">
      <div class="info-item"><span class="info-label">المرحلة:</span> <span class="info-value" id="resultStage">-</span>
      </div>
      <div class="info-item"><span class="info-label">الفصل:</span> <span class="info-value" id="resultClass">-</span>
      </div>
     </div>
     <div class="info-row">
      <div class="info-item"><span class="info-label">رقم الهاتف:</span> <span class="info-value" id="resultPhone">-</span>
      </div>
     </div>
    </div><!-- Grades Table -->
    <div class="grades-table">
     <div class="table-header">
      <div>
       المادة
      </div>
      <div>
       الدرجة

      <div>
       التقدير
      </div>
      <div>
       النسبة %
      </div>
     </div>
     <div id="gradesTableBody"><!-- يتم ملء البيانات ديناميكياً -->
     </div>
    </div><!-- Total Section -->
    <div class="total-section">
     <div class="total-item">
      <h3>المجموع الكلي</h3>
      <div class="value" id="totalScore">
       0
      </div>
     </div>
     <div class="total-item">
      <h3>المتوسط</h3>
      <div class="value" id="averageScore">
       0
      </div>
     </div>
    </div><!-- Rating Badge -->
    <div id="ratingBadge" class="rating-badge rating-excellent">
     ممتاز
    </div>
   </div>
  </div>
  <script>
        // ================================
        // متغيرات عامة
        // ================================

        // تخزين جميع النتائج في الذاكرة (Caching)
        let allResults = {
            midterm1: [],
            term1: [],
            midterm2: [],
            term2: []
        };

        // حالة تحميل البيانات
        let dataLoaded = false;

        // روابط ملفات CSV من Google Sheets
        const csvLinks = {
            midterm1: 'https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/export?format=csv&gid=0',
            term1: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO_7x8ri8gn0SpiGZCnL8O-LP0IbF_E-uy22BXjTUm2qI4JhaBrYQXDRwV_tjUGfxIiFQ3iP9-auHZ/pub?gid=1381578766&single=true&output=csv',
            midterm2: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO_7x8ri8gn0SpiGZCnL8O-LP0IbF_E-uy22BXjTUm2qI4JhaBrYQXDRwV_tjUGfxIiFQ3iP9-auHZ/pub?gid=763792200&single=true&output=csv',
            term2: 'https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/export?format=csv&gid=3'
        };

        // ================================
        // دالة تحميل البيانات من CSV
        // ================================
        async function fetchCSVData(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }
                const text = await response.text();
                return parseCSV(text);
            } catch (error) {
                console.error('خطأ في تحميل البيانات:', error);
                throw error;
            }
        }

        // ================================
        // دالة تحليل بيانات CSV (محسّنة)
        // ================================
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            if (lines.length < 2) return [];

            const headers = lines[0].split('\t').map(h => h.trim());
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === '') continue;

                const values = lines[i].split('\t').map(v => v.trim());
                const row = {};

                headers.forEach((header, index) => {
                    row[header] = values[index] || '';
                });

                data.push(row);
            }

            console.log('تم تحليل البيانات:', data.length, 'صف');
            return data;
        }

        // ================================
        // دالة تهيئة البيانات عند فتح الصفحة
        // ================================
        async function initializeData() {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.classList.remove('hidden');

            try {
                // تحميل جميع الملفات بشكل متزامن
                const results = await Promise.all([
                    fetchCSVData(csvLinks.midterm1),
                    fetchCSVData(csvLinks.term1),
                    fetchCSVData(csvLinks.midterm2),
                    fetchCSVData(csvLinks.term2)
                ]);

                // تخزين البيانات في الكائن allResults
                allResults.midterm1 = results[0];
                allResults.term1 = results[1];
                allResults.midterm2 = results[2];
                allResults.term2 = results[3];

                dataLoaded = true;
                loadingScreen.classList.add('hidden');
                showMessage('success', 'تم تحميل البيانات بنجاح');
            } catch (error) {
                loadingScreen.classList.add('hidden');
                showMessage('error', 'حدث خطأ في تحميل البيانات. تأكد من روابط CSV صحيحة.');
                console.error('خطأ التهيئة:', error);
            }
        }

        // ================================
        // دالة البحث عن الطالب
        // ================================
        function searchStudent() {
            // الحصول على القيم المدخلة
            const examType = document.getElementById('examType').value;
            const studentCode = document.getElementById('studentCode').value.trim();

            // التحقق من صحة المدخلات
            if (!examType) {
                showError('يرجى اختيار نوع الامتحان');
                return;
            }

            if (!studentCode) {
                showError('يرجى إدخال كود الطالب');
                return;
            }

            // البحث عن الطالب في البيانات المخزنة
            const studentData = allResults[examType].find(
                student => student['كود الدارس'] === studentCode
            );

            if (studentData) {
                displayResult(studentData);
            } else {
                showError('لم يتم العثور على الطالب. يرجى التحقق من كود الطالب.');
            }
        }

        // ================================
        // دالة عرض النتائج
        // ================================
        function displayResult(studentData) {
            // إخفاء رسالة الخطأ
            hideError();

            // ملء البيانات الشخصية
            document.getElementById('resultStudentCode').textContent = studentData['كود الدارس'] || '-';
            document.getElementById('resultStudentName').textContent = studentData['اسم الدارس بالكامل'] || '-';
            document.getElementById('resultStage').textContent = studentData['المرحلة الدراسية'] || '-';
            document.getElementById('resultClass').textContent = studentData['الفصل داخل المركز'] || '-';
            document.getElementById('resultPhone').textContent = studentData['رقم الهاتف'] || '-';

            // المواد والدرجات (التقديرات)
            const subjects = [
                { name: 'الطقوس الكنسية', key: 'الطقوس الكنسية' },
                { name: 'المحفوظات والأجبية', key: 'المحفوظات والأجبية' },
                { name: 'اللغة القبطية', key: 'اللغة القبطية' },
                { name: 'الألحان والتسيحة', key: 'الألحان والتسيحة' }
            ];

            // حساب المجموع والمتوسط
            let gradesHTML = '';

            subjects.forEach(subject => {
                const rating = studentData[subject.key] || '-';
                const numericScore = ratingToScore(rating);

                gradesHTML += `
                    <div class="table-row">
                        <div class="grade-subject-name">${subject.name}</div>
                        <div>${numericScore}</div>
                        <div class="grade-badge" style="background: ${getGradeColor(rating)}">${rating}</div>
                        <div>${numericScore}%</div>
                    </div>
                `;
            });

            // ملء جدول الدرجات
            document.getElementById('gradesTableBody').innerHTML = gradesHTML;

            // عرض المجموع والمتوسط من البيانات مباشرة
            const totalScore = studentData['المجموع'] || '0';
            const averageScore = studentData['النسبة المؤية'] || '0';
            
            document.getElementById('totalScore').textContent = totalScore;
            document.getElementById('averageScore').textContent = averageScore;

            // عرض التقدير النهائي
            const finalRating = studentData['النتيجة النهائية'] || 'غير محدد';
            const ratingBadge = document.getElementById('ratingBadge');
            ratingBadge.textContent = finalRating;
            ratingBadge.className = `rating-badge ${getRatingClass(finalRating)}`;

            // عرض منطقة النتائج
            document.getElementById('resultContainer').classList.add('show');

            // تمرير التركيز للنتائج
            setTimeout(() => {
                document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }

        // ================================
        // دالة تحويل التقدير النصي إلى درجة رقمية
        // ================================
        function ratingToScore(rating) {
            const ratingMap = {
                'ممتاز': 95,
                'جيد جدا': 85,
                'جيد جداً': 85,
                'جيد': 75,
                'مقبول': 60,
                'ضعيف': 40,
                '-': 0
            };
            return ratingMap[rating] || 0;
        }

        // ================================
        // دالة حساب التقدير بناءً على الدرجة
        // ================================
        function calculateRating(score) {
            const numScore = parseFloat(score);

            if (numScore >= 85) return 'ممتاز';
            if (numScore >= 75) return 'جيد جداً';
            if (numScore >= 65) return 'جيد';
            if (numScore >= 50) return 'مقبول';
            return 'ضعيف';
        }

        // ================================
        // دالة الحصول على لون التقدير
        // ================================
        function getGradeColor(rating) {
            const colors = {

                'جيد جدا': 'linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%)',

            return colors[rating] || '#999999';

        function getRatingClass(rating) {
            const classes = {
                'ممتاز': 'rating-excellent',
                'جيد جدا': 'rating-very-good',
                'جيد جداً': 'rating-very-good',
                'جيد': 'rating-good',
                'مقبول': 'rating-acceptable',

            // إخفاء النتائج
            document.getElementById('resultContainer').classList.remove('show');

            // إخفاء الرسالة بعد 5 ثوان
            setTimeout(() => {
                errorContainer.classList.remove('show');

        }
